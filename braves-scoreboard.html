<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atlanta Braves Scoreboard</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #13274F;
    --red: #CE1141;
    --gold: #EAAA00;
    --white: #F5F0E8;
    --gray: #8a8a8a;
    --dark: #0a1829;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--dark);
    color: var(--white);
    font-family: 'IBM Plex Sans', sans-serif;
    min-height: 100vh;
    overflow: hidden;
    position: relative;
  }

  /* Background texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(255,255,255,0.012) 3px,
        rgba(255,255,255,0.012) 4px
      );
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 1200px;
    margin: 0 auto;
    padding: 28px 32px;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 32px;
    border-bottom: 2px solid var(--red);
    padding-bottom: 20px;
  }

  .team-logo {
    width: 64px;
    height: 64px;
    background: var(--red);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Bebas Neue', cursive;
    font-size: 28px;
    color: var(--white);
    letter-spacing: 1px;
    flex-shrink: 0;
    box-shadow: 0 0 0 3px var(--gold);
  }

  .header-text h1 {
    font-family: 'Bebas Neue', cursive;
    font-size: 42px;
    letter-spacing: 3px;
    color: var(--white);
    line-height: 1;
  }

  .header-text .season-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--gold);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 4px;
  }

  .header-right {
    margin-left: auto;
    text-align: right;
  }

  .live-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--red);
    color: white;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    padding: 4px 10px;
    border-radius: 2px;
    margin-bottom: 6px;
  }

  .live-dot {
    width: 6px;
    height: 6px;
    background: white;
    border-radius: 50%;
    animation: pulse 1.5s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .last-updated {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--gray);
    letter-spacing: 1px;
  }

  /* Section label */
  .section-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 4px;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  /* Game Card */
  .games-grid {
    display: flex;
    flex-direction: column;
    gap: 14px;
    margin-bottom: 36px;
  }

  .game-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-left: 4px solid transparent;
    padding: 20px 24px;
    display: grid;
    grid-template-columns: 1fr auto 1fr auto;
    align-items: center;
    gap: 16px;
    transition: border-color 0.3s;
    opacity: 0;
    transform: translateY(10px);
    animation: fadeUp 0.4s forwards;
  }

  .game-card.live {
    border-left-color: var(--red);
    background: rgba(206,17,65,0.06);
  }

  .game-card.win {
    border-left-color: var(--gold);
  }

  .game-card.loss {
    border-left-color: rgba(255,255,255,0.15);
  }

  .game-card.upcoming {
    border-left-color: var(--navy);
    opacity: 0.85;
  }

  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }

  .team-block {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .team-block.away { flex-direction: row; }
  .team-block.home { flex-direction: row-reverse; text-align: right; }

  .team-abbr {
    font-family: 'Bebas Neue', cursive;
    font-size: 28px;
    letter-spacing: 2px;
    line-height: 1;
  }

  .team-name-small {
    font-size: 11px;
    color: var(--gray);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .team-record {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--gray);
    margin-top: 2px;
  }

  /* Score display */
  .score-block {
    display: flex;
    align-items: center;
    gap: 12px;
    min-width: 120px;
    justify-content: center;
  }

  .score {
    font-family: 'Bebas Neue', cursive;
    font-size: 52px;
    line-height: 1;
    letter-spacing: 2px;
    min-width: 48px;
    text-align: center;
  }

  .score.winner { color: var(--gold); }
  .score.loser { color: var(--gray); }
  .score.upcoming { color: rgba(255,255,255,0.2); font-size: 32px; }

  .score-divider {
    font-family: 'Bebas Neue', cursive;
    font-size: 28px;
    color: rgba(255,255,255,0.15);
  }

  /* Status block */
  .status-block {
    min-width: 100px;
    text-align: center;
  }

  .status-badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    padding: 4px 10px;
    border-radius: 2px;
    display: inline-block;
  }

  .status-badge.live {
    background: var(--red);
    color: white;
    animation: glow 2s ease-in-out infinite alternate;
  }

  @keyframes glow {
    from { box-shadow: 0 0 4px rgba(206,17,65,0.4); }
    to { box-shadow: 0 0 12px rgba(206,17,65,0.8); }
  }

  .status-badge.final { background: rgba(255,255,255,0.08); color: var(--gray); }
  .status-badge.upcoming { background: rgba(234,170,0,0.1); color: var(--gold); border: 1px solid rgba(234,170,0,0.3); }

  .game-venue {
    font-size: 10px;
    color: rgba(255,255,255,0.25);
    margin-top: 5px;
    font-family: 'IBM Plex Mono', monospace;
    letter-spacing: 0.5px;
  }

  /* Innings line score */
  .linescore {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    color: var(--gray);
    margin-top: 6px;
    letter-spacing: 1px;
  }

  /* Standings */
  .standings-section {
    margin-top: 8px;
  }

  .standings-table {
    width: 100%;
    border-collapse: collapse;
  }

  .standings-table th {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--gold);
    text-align: left;
    padding: 6px 12px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }

  .standings-table th:not(:first-child) { text-align: center; }

  .standings-table td {
    padding: 10px 12px;
    font-size: 13px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }

  .standings-table td:not(:first-child) {
    text-align: center;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
  }

  .standings-table tr.braves-row td {
    color: var(--white);
    background: rgba(206,17,65,0.08);
  }

  .standings-table tr:not(.braves-row) td {
    color: rgba(255,255,255,0.55);
  }

  .team-name-full { display: flex; align-items: center; gap: 8px; }
  .braves-indicator {
    width: 6px;
    height: 6px;
    background: var(--red);
    border-radius: 50%;
  }

  /* Loading / Error */
  .loading-state, .error-state {
    text-align: center;
    padding: 60px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    color: var(--gray);
    letter-spacing: 2px;
  }

  .loading-spinner {
    width: 32px;
    height: 32px;
    border: 2px solid rgba(255,255,255,0.1);
    border-top-color: var(--red);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .no-games {
    text-align: center;
    padding: 40px;
    color: var(--gray);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    letter-spacing: 2px;
  }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="team-logo">ATL</div>
    <div class="header-text">
      <h1>Atlanta Braves</h1>
      <div class="season-label">2026 Season · Live Scoreboard</div>
    </div>
    <div class="header-right">
      <div class="live-badge"><span class="live-dot"></span> LIVE DATA</div>
      <div class="last-updated" id="last-updated">Updating...</div>
    </div>
  </div>

  <div class="section-label" id="games-label">Recent &amp; Upcoming Games</div>
  <div class="games-grid" id="games-container">
    <div class="loading-state">
      <div class="loading-spinner"></div>
      LOADING GAMES...
    </div>
  </div>

  <div class="standings-section">
    <div class="section-label">NL East Standings</div>
    <div id="standings-container">
      <div class="loading-state">
        <div class="loading-spinner"></div>
        LOADING STANDINGS...
      </div>
    </div>
  </div>

</div>

<script>
  const BRAVES_ID = 144;
  const BRAVES_ABBR = 'ATL';

  function formatTime(dateStr) {
    const d = new Date(dateStr);
    return d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', timeZoneName: 'short' });
  }

  function formatDate(dateStr) {
    const d = new Date(dateStr + 'T00:00:00');
    return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
  }

  function getGameStatus(game) {
    const code = game.status?.codedGameState;
    const detail = game.status?.detailedState;
    if (code === 'I') return 'live';
    if (code === 'F' || code === 'O') return 'final';
    return 'upcoming';
  }

  function renderGames(games) {
    const container = document.getElementById('games-container');
    if (!games || games.length === 0) {
      container.innerHTML = '<div class="no-games">NO GAMES FOUND FOR THIS PERIOD</div>';
      return;
    }

    container.innerHTML = games.map((game, i) => {
      const away = game.teams.away;
      const home = game.teams.home;
      const status = getGameStatus(game);
      const isBravesHome = home.team.id === BRAVES_ID;
      const isBravesAway = away.team.id === BRAVES_ID;

      const awayScore = away.score ?? null;
      const homeScore = home.score ?? null;
      const awayWin = status === 'final' && awayScore > homeScore;
      const homeWin = status === 'final' && homeScore > awayScore;

      const bravesWon = (isBravesHome && homeWin) || (isBravesAway && awayWin);
      const bravesLost = ((isBravesHome && awayWin) || (isBravesAway && homeWin));

      let cardClass = 'game-card';
      if (status === 'live') cardClass += ' live';
      else if (status === 'final' && bravesWon) cardClass += ' win';
      else if (status === 'final' && bravesLost) cardClass += ' loss';
      else if (status === 'upcoming') cardClass += ' upcoming';

      let statusHTML = '';
      if (status === 'live') {
        const inning = game.linescore?.currentInning || '';
        const half = game.linescore?.inningHalf || '';
        statusHTML = `<span class="status-badge live">${half.toUpperCase().charAt(0)} ${inning}</span>`;
      } else if (status === 'final') {
        statusHTML = `<span class="status-badge final">FINAL</span>`;
      } else {
        const gameTime = game.gameDate ? formatTime(game.gameDate) : 'TBD';
        statusHTML = `<span class="status-badge upcoming">${gameTime}</span>`;
      }

      const awayScoreClass = status === 'upcoming' ? 'upcoming' : (awayWin ? 'winner' : 'loser');
      const homeScoreClass = status === 'upcoming' ? 'upcoming' : (homeWin ? 'winner' : 'loser');
      const scoreDisplay = status === 'upcoming'
        ? `<div class="score upcoming">-</div><div class="score-divider">VS</div><div class="score upcoming">-</div>`
        : `<div class="score ${awayScoreClass}">${awayScore ?? 0}</div><div class="score-divider">·</div><div class="score ${homeScoreClass}">${homeScore ?? 0}</div>`;

      const awayRec = away.leagueRecord ? `${away.leagueRecord.wins}-${away.leagueRecord.losses}` : '';
      const homeRec = home.leagueRecord ? `${home.leagueRecord.wins}-${home.leagueRecord.losses}` : '';

      const venue = game.venue?.name || '';
      const gameDate = formatDate(game.officialDate || game.gameDate?.split('T')[0]);

      return `
        <div class="${cardClass}" style="animation-delay:${i * 0.07}s">
          <div class="team-block away">
            <div>
              <div class="team-abbr">${away.team.abbreviation}</div>
              <div class="team-name-small">${away.team.teamName}</div>
              <div class="team-record">${awayRec}</div>
            </div>
          </div>
          <div class="score-block">${scoreDisplay}</div>
          <div class="team-block home">
            <div>
              <div class="team-abbr">${home.team.abbreviation}</div>
              <div class="team-name-small">${home.team.teamName}</div>
              <div class="team-record">${homeRec}</div>
            </div>
          </div>
          <div class="status-block">
            <div class="game-date-label" style="font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--gray);letter-spacing:1px;margin-bottom:4px;">${gameDate}</div>
            ${statusHTML}
            <div class="game-venue">${venue}</div>
          </div>
        </div>
      `;
    }).join('');
  }

  function renderStandings(records) {
    const container = document.getElementById('standings-container');
    if (!records || records.length === 0) {
      container.innerHTML = '<div class="no-games">STANDINGS UNAVAILABLE</div>';
      return;
    }

    const rows = records.map(r => {
      const isBraves = r.team.id === BRAVES_ID;
      const gb = r.gamesBack === '-' ? '—' : r.gamesBack;
      return `
        <tr class="${isBraves ? 'braves-row' : ''}">
          <td>
            <div class="team-name-full">
              ${isBraves ? '<span class="braves-indicator"></span>' : ''}
              ${r.team.name}
            </div>
          </td>
          <td>${r.wins}</td>
          <td>${r.losses}</td>
          <td>${r.winningPercentage}</td>
          <td>${gb}</td>
          <td>${r.streak?.streakCode || '—'}</td>
        </tr>
      `;
    }).join('');

    container.innerHTML = `
      <table class="standings-table">
        <thead>
          <tr>
            <th>TEAM</th>
            <th>W</th>
            <th>L</th>
            <th>PCT</th>
            <th>GB</th>
            <th>STRK</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    `;
  }

  async function fetchData() {
    // Get today and surrounding dates for recent + upcoming
    const today = new Date();
    const startDate = new Date(today);
    startDate.setDate(today.getDate() - 3);
    const endDate = new Date(today);
    endDate.setDate(today.getDate() + 4);

    const fmt = d => d.toISOString().split('T')[0];

    try {
      // Fetch schedule
      const schedRes = await fetch(
        `https://statsapi.mlb.com/api/v1/schedule?teamId=${BRAVES_ID}&startDate=${fmt(startDate)}&endDate=${fmt(endDate)}&sportId=1&hydrate=team,linescore,venue`
      );
      const schedData = await schedRes.json();

      const allGames = [];
      if (schedData.dates) {
        for (const dateObj of schedData.dates) {
          for (const game of dateObj.games) {
            allGames.push(game);
          }
        }
      }

      // Sort: live first, then by date
      allGames.sort((a, b) => {
        const statusA = getGameStatus(a);
        const statusB = getGameStatus(b);
        if (statusA === 'live' && statusB !== 'live') return -1;
        if (statusB === 'live' && statusA !== 'live') return 1;
        return new Date(a.gameDate) - new Date(b.gameDate);
      });

      renderGames(allGames);

      // Update label
      const hasLive = allGames.some(g => getGameStatus(g) === 'live');
      document.getElementById('games-label').textContent = hasLive
        ? '🔴 Live Game · Recent & Upcoming'
        : 'Recent & Upcoming Games';

    } catch (err) {
      document.getElementById('games-container').innerHTML =
        `<div class="error-state">UNABLE TO LOAD GAMES<br><small style="font-size:10px;opacity:0.5;margin-top:8px;display:block">${err.message}</small></div>`;
    }

    // Fetch standings
    try {
      const standRes = await fetch(
        `https://statsapi.mlb.com/api/v1/standings?leagueId=104&season=2026&standingsTypes=regularSeason`
      );
      const standData = await standRes.json();

      // Find NL East (division 204)
      let nleRecords = [];
      for (const record of standData.records || []) {
        if (record.division?.id === 204) {
          nleRecords = record.teamRecords;
          break;
        }
      }
      renderStandings(nleRecords);
    } catch (err) {
      document.getElementById('standings-container').innerHTML =
        `<div class="error-state">UNABLE TO LOAD STANDINGS</div>`;
    }

    // Update timestamp
    document.getElementById('last-updated').textContent =
      'Updated ' + new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
  }

  // Initial load
  fetchData();

  // Refresh every 60 seconds
  setInterval(fetchData, 60000);
</script>
</body>
</html>
